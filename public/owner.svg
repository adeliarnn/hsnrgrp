<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGradient)" />
  
  <!-- Inner white circle -->
  <circle cx="200" cy="200" r="180" fill="white" opacity="0.95" />
  
  <!-- Person icon/avatar -->
  <g>
    <!-- Head -->
    <circle cx="200" cy="120" r="40" fill="#2563eb" />
    
    <!-- Body -->
    <ellipse cx="200" cy="220" rx="45" ry="55" fill="#2563eb" />
    
    <!-- Arms -->
    <rect x="145" y="190" width="20" height="60" rx="10" fill="#2563eb" />
    <rect x="235" y="190" width="20" height="60" rx="10" fill="#2563eb" />
  </g>
  
  <!-- Text -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2563eb">
    Haji Isam
  </text>
  <text x="200" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">
    Founder & Chairman
  </text>
</svg>
